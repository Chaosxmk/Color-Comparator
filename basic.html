<!DOCTYPE html>
<html class="min-vh-100" lang="en-gb" dir="ltr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"/>
  <meta charset="utf-8"/>
  <title>Color comparator</title>
  <link href="favicon-32x32.png" rel="icon" sizes="32x32" type="image/png">
  <link href="favicon-16x16.png" rel="icon" sizes="16x16" type="image/png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="./general.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.css"/>
  <script src="https://cdn.jsdelivr.net/npm/jquery@latest/dist/jquery.min.js"></script>
  <script src="./basic.js"></script>
</head>
<body class="vh-100 d-flex p-3 flex-column">
  <nav class="position-fixed top-0 start-0 m-3">
    <a href="./advanced.html" class="btn btn-primary btn-sm">Advanced mode</a>
  </nav>

  <main class="my-auto position-relative">
    <form class="container container-fluid p-3 border rounded bg-light">
      <div class="row align-items-center g-3">
        <div class="col-lg col-sm-6 col-12">
          <div class="form-floating">
            <input type="text" class="form-control hex-colors" id="hexA" data-target="#rgbA" data-paint=".color-a" maxlength="7" placeholder="Hex">
            <label for="hexA">Hex</label>
          </div>
        </div>

        <div class="col-lg col-sm-6 col-12">
          <div class="form-floating">
            <input type="text" class="form-control rgb-colors" id="rgbA" data-target="#hexA" data-paint=".color-a" maxlength="13" placeholder="RGB">
            <label for="rgbA">RGB</label>
          </div>
        </div>

        <div class="col-lg-auto col-12">
          <span class="vr d-lg-block d-none m-0"></span>
          <hr class="d-lg-none m-0">
        </div>

        <div class="col-lg col-sm-6 col-12">
          <div class="form-floating">
            <input type="text" class="form-control hex-colors" id="hexB" data-target="#rgbB" data-paint=".color-b" maxlength="7" placeholder="Hex">
            <label for="hexB">Hex</label>
          </div>
        </div>

        <div class="col-lg col-sm-6 col-12">
          <div class="form-floating">
            <input type="text" class="form-control rgb-colors" id="rgbB" data-target="#hexB" data-paint=".color-b" maxlength="13" placeholder="RGB">
            <label for="rgbB">RGB</label>
          </div>
        </div>
      </div>
    </form>
  </main>

  <aside class="w-100 h-100 position-fixed top-0 start-0">
    <div class="color-a w-100 h-100 position-absolute top-0 start-0 d-lg-block d-none"></div>
    <div class="color-b w-50 h-100 position-absolute top-0 end-0 d-lg-block d-none"></div>

    <div class="color-a w-100 h-100 position-absolute top-0 start-0 d-lg-none"></div>
    <div class="color-b w-100 h-50 position-absolute bottom-0 start-0 d-lg-none"></div>
  </aside>
</body>
</html>
